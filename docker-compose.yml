services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soha
      POSTGRES_PASSWORD: soha
      POSTGRES_DB: soha
    ports:
      - "5432:5432"
    volumes:
      - soha_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soha"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://soha:soha@db:5432/soha?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  soha_pgdata:
